name: Distribute

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Build
        run: |
          mkdir -p dist
          bun build ./index.ts --compile --target=bun-linux-x64 --outfile dist/discord-delete-linux-x64
          bun build ./index.ts --compile --target=bun-windows-x64 --outfile dist/discord-delete-windows-x64.exe
          bun build ./index.ts --compile --target=bun-darwin-x64 --outfile dist/discord-delete-macos-x64
          bun build ./index.ts --compile --target=bun-darwin-arm64 --outfile dist/discord-delete-macos-arm64

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
